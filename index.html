<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./assets/img/icons.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <title>Terremotos</title>
</head>
<body>
    <header>
        <h1>Mapa de terremotos en el mundo</h1>
    </header>
    <main>
        <section id="mapa"></section>
        <section class="filtros-container">
            <section class="filtros">
                <label for="magnitud">Filtro magnitud</label>
                <input type="number" id="magnitud" name="filtro por magnitud">
                <label for="fecha-inicio">Filtro fecha inicio</label>
                <input type="date" id="fecha-inicio" name="filtro por fecha de inicio">
                <label for="fecha-fin">Filtro fecha fin</label>
                <input type="date" id="fecha-fin" name="filtro por fecha final">
                <button type="button" class="btn-buscar">Buscar</button>
            </section>
            <section id="mapa2"></section>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Earthquakes Project</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="./script.js"></script>
</body>
</html>
