<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./assets/img/icons.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <title>Terremotos</title>
</head>
<body>
    <header>
        <h1>Mapa de terremotos en el mundo</h1>
    </header>
    <main>
        <div id="spinner">
            <img src="./assets/img/spinner.gif" alt="Cargando...">
        </div>
        <section class="login">
            <article>
                <h2>Registro</h2>
                <form id="form1">
                    <label for="email">Correo</label>
                    <input type="email" id="email" name="email" placeholder="paola@gmail.com">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" name="pass" placeholder="escriba su contraseña">
                    <label for="pass2">Comfirme contraseña</label>
                    <input type="password" id="pass2" name="pass2" placeholder="confirme contraseña">
                    <button type="submit">Enviar</button>
                </form>
                <p id="mensaje-registro"></p>
            </article>
            <article>
                <h2>Iniciar sesión</h2>
                <form id="form2">
                    <label for="email2">Correo</label>
                    <input type="email" id="email2" name="email2" placeholder="paola@gmail.com">
                    <label for="pass3">Contraseña</label>
                    <input type="password" id="pass3" name="pass3" placeholder="escriba su contraseña">
                    <button type="submit">Iniciar sesión</button>
                </form>
                <p id="mensaje-login"></p>
                <button type="button" id="salir">Cerrar sesión</button>
                <p id="message"></p>
            </article>
        </section>
        <section class="mapa-container">
            <section class="btn-container">
                <button type="button" class="btn-terremotos">Terremotos</button>
                <button type="button" class="btn-favoritos">Favoritos</button>
            </section>
            <section id="mapa"></section>
        </section>
        
        <section class="filtros-container">
            <section class="filtros">
                <label for="magnitud">Filtro magnitud</label>
                <input type="number" id="magnitud" name="filtro por magnitud">
                <label for="fecha-inicio">Filtro fecha inicio</label>
                <input type="date" id="fecha-inicio" name="filtro por fecha de inicio">
                <label for="fecha-fin">Filtro fecha fin</label>
                <input type="date" id="fecha-fin" name="filtro por fecha final">
                <button type="button" class="btn-buscar">Buscar</button>
            </section>
            <p id="mensaje"></p>
            <section id="mapa2"></section>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Earthquakes Project</p>
    </footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!--el core de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-app.js"></script>
    
    <!-- para la bbdd-->
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-firestore.js"></script>

    <!-- para autenticación -->
    <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-auth.js"></script>
    <script src="./script.js"></script>
</body>
</html>
